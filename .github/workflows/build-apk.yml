name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  verify:
    name: Lint, typecheck y tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm install

    - name: Lint
      run: npm run lint

    - name: Typecheck
      run: npx tsc --noEmit -p tsconfig.app.json

    - name: Tests
      run: npm test

  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm install

    - name: Build Web App
      run: npm run build
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

    - name: Capacitor Sync
      run: npx cap sync android

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Make Gradle executable
      run: chmod +x ./android/gradlew

    - name: Decodificar keystore de firma (desde GitHub Secrets)
      # Escribe la keystore solo si el secret existe. Sin él, el build cae a la
      # firma de debug (la APK funciona pero NO se podrá actualizar de forma
      # estable hasta que añadas los secrets).
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/ticketsaver.p12
          echo "Keystore de firma lista."
        else
          echo "::warning::Sin ANDROID_KEYSTORE_BASE64: se firmará con debug y la APK no se podrá actualizar sin desinstalar."
        fi

    - name: Build signed release APK
      working-directory: ./android
      # Firma estable (misma clave en cada build) => se puede actualizar sin
      # desinstalar. versionCode crece con cada ejecución para que Android la
      # reconozca como una versión más nueva.
      env:
        ANDROID_KEYSTORE_FILE: ticketsaver.p12
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        ANDROID_VERSION_CODE: ${{ github.run_number }}
        ANDROID_VERSION_NAME: 1.0.${{ github.run_number }}
      run: ./gradlew assembleRelease

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TicketSaver-APK
        path: android/app/build/outputs/apk/release/app-release.apk
